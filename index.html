<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <title>Todo App</title>
  
  <!-- SEO & PWA metadata -->
  <meta name="description" content="A beautiful, premium, offline-first target and todo tracker designed for high productivity.">
  <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Todo App">
  
  <!-- Critical layout inlined so the body and splash are fully stable from the
       very first paint. Prevents any layout shift when main.css arrives via SW. -->
  <style>
    /* Body layout set here so main.css applying the same values causes zero change */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #0a0a0c;
      overflow-x: hidden;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    @media (prefers-color-scheme: light) {
      body { background-color: #f8fafc; }
    }

    /* Splash promoted to its own compositor layer (will-change: transform) so
       any late body/viewport geometry changes don't cause it to repaint/shift */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      background: #0a0a0c;
      transition: opacity 0.4s ease-out;
      will-change: transform;
    }
    @media (prefers-color-scheme: light) {
      #splash { background: #f8fafc; }
    }
    @keyframes splash-rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dot-pulse {
      0%, 60%, 100% { opacity: 0.2; transform: scale(0.7); }
      30%            { opacity: 1;   transform: scale(1);   }
    }

    #splash-wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: splash-rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    #splash-name {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: clamp(2.25rem, 9vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 20%, #a5b4fc 60%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #splash-sub {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4b5563;
    }
    #splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 3rem;
      opacity: 0;
      animation: splash-rise 0.3s ease-out 0.45s forwards;
    }
    #splash-dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6366f1;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @media (prefers-color-scheme: light) {
      #splash-name {
        background: linear-gradient(135deg, #0f172a 20%, #4f46e5 100%);
        -webkit-background-clip: text;
        background-clip: text;
      }
      #splash-sub  { color: #64748b; }
      #splash-dots span { background: #4f46e5; }
    }

    #splash.splash--out {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles/main.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" href="images/app-icon48.png" type="image/png">
  
  <!-- Early Global PWA Event Capture -->
  <script>
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-install-ready'));
      console.log('[PWA Engine] Install prompt captured early.');
    });
  </script>
  
  <!-- App Icons -->
  <link rel="apple-touch-icon" href="images/app-icon192.png">

  <!-- Dev Mode SW Unregistration and Cache Clearing to break cache-locks -->
  <script>
    const isLocalDev = window.location.hostname === 'localhost' || 
                       window.location.hostname === '127.0.0.1' || 
                       window.location.hostname.startsWith('192.168.') || 
                       window.location.port === '5173';
                  
    if (isLocalDev) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function() {
              console.log('[Dev Engine] Service Worker unregistered.');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name).then(function() {
              console.log('[Dev Engine] Cache cleared:', name);
            });
          }
        });
      }
    }
  </script>

  <!-- Service Worker Registration in Production -->
  <script>
    const isLocalDevMode = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' || 
                           window.location.hostname.startsWith('192.168.') || 
                           window.location.port === '5173';

    if (!isLocalDevMode) {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('[Service Worker] Registered successfully:', registration.scope);
            })
            .catch((error) => {
              console.error('[Service Worker] Registration failed:', error);
            });
        });
      }
    }
  </script>

  <!-- Component Scripts & ES Modules -->
  <script type="module" src="scripts/main.ts"></script>
</head>
<body>

  <!-- Splash screen: dismissed by JS after min display time + app ready -->
  <div id="splash" aria-hidden="true">
    <div id="splash-wordmark">
      <p id="splash-name">Todo App</p>
      <p id="splash-sub">Offline first &middot; Always in sync</p>
    </div>
    <div id="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Top-level Web Component orchestrator -->
  <todo-app></todo-app>

  <script>
    (function () {
      const MIN_MS = 1500;
      const t0 = Date.now();
      function dismiss() {
        const el = document.getElementById('splash');
        if (!el) return;
        const remaining = Math.max(0, MIN_MS - (Date.now() - t0));
        setTimeout(function () {
          el.classList.add('splash--out');
          el.addEventListener('transitionend', function () { el.remove(); }, { once: true });
        }, remaining);
      }
      customElements.whenDefined('todo-app').then(dismiss);
    })();
  </script>

</body>
</html>
